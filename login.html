<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Monsoon CME — SPICK PICU</title>
  <meta name="description"
    content="Delegate login for abstract submission — Monsoon CME of Pediatric Intensive Care 2026.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="nav-placeholder"></div>

  <section class="page-header">
    <div class="container">
      <h1>Delegate Login</h1>
      <div class="divider"></div>
      <p>Login to submit your abstracts</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="login-card animate-on-scroll">
        <h2 style="text-align:center; margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="text-align:center; color: var(--color-text-muted); margin-bottom: 2rem;">
          Don't have an account? <a href="register.html" style="color: var(--color-accent); font-weight: 600;">Register
            here</a>
        </p>

        <form id="login-form" novalidate>
          <div class="form-group" data-required>
            <label for="login-email">Email Address <span class="required">*</span></label>
            <input type="email" id="login-email" class="form-control" placeholder="your@email.com" required>
            <div class="form-error">Valid email is required</div>
          </div>

          <div class="form-group" data-required>
            <label for="login-password">Password <span class="required">*</span></label>
            <div class="password-wrapper">
              <input type="password" id="login-password" class="form-control" placeholder="Enter your password"
                required>
              <button type="button" class="password-toggle" aria-label="Toggle password visibility">👁️</button>
            </div>
            <div class="form-error">Password is required</div>
          </div>

          <button type="submit" id="login-btn" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem;">
            Login
          </button>
        </form>
        <button class="btn btn-outline"
          style="background-color:#003A8C; color:white; border:none; padding:6px 14px; margin-top:10px;"
          onclick="window.location.href='images/ABC_Abstracts.pdf'">
          Click here to download abstract submission guideline
        </button>
        <div id="login-message" style="margin-top: 1rem; text-align: center;"></div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <button class="back-to-top" aria-label="Back to top">↑</button>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // If already logged in, redirect to dashboard
      const session = localStorage.getItem('spick_session');
      if (session) {
        window.location.href = 'dashboard.html';
        return;
      }

      // Password toggle
      const pwToggle = document.querySelector('.password-toggle');
      const pwField = document.getElementById('login-password');
      if (pwToggle && pwField) {
        pwToggle.addEventListener('click', function () {
          const isPassword = pwField.type === 'password';
          pwField.type = isPassword ? 'text' : 'password';
          this.textContent = isPassword ? '🙈' : '👁️';
        });
      }

      // Login form
      const form = document.getElementById('login-form');
      const loginBtn = document.getElementById('login-btn');
      const loginMsg = document.getElementById('login-message');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value.trim();

        if (!email || !password) {
          showToast('Please fill in all fields.', 'error');
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';
        loginMsg.innerHTML = '';

        try {
          const response = await fetch(window.SPICK_CONFIG.APPS_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'login', email: email, password: password })
          });

          const result = await response.json();

          if (result.success) {
            localStorage.setItem('spick_session', JSON.stringify({
              email: result.email,
              name: result.name,
              serialNumber: result.serialNumber,
              role: result.role,
              attendingType: result.attendingType
            }));
            showToast('Login successful! Redirecting...', 'success');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
          } else {
            showToast(result.message || 'Invalid email or password.', 'error');
          }
        } catch (err) {
          console.error('Login error:', err);
          showToast('Network error. Please try again.', 'error');
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      });
    });
  </script>
</body>

</html>
