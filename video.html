<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video | Monsoon CME — SPICK PICU</title>
  <meta name="description" content="Event Video for Monsoon CME of Pediatric Intensive Care 2026.">
  <link rel="stylesheet" href="style.css">
  <style>
    .video-section {
      padding: 60px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .video-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      /* 16:9 aspect ratio */
      padding-bottom: 56.25%; 
      height: 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }
    
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <div id="nav-placeholder"></div>

  <section class="page-header">
    <div class="container">
      <h1>Event Video</h1>
      <div class="divider"></div>
      <p>Watch our latest updates</p>
    </div>
  </section>

  <section class="section video-section">
    <div class="container" style="display: flex; justify-content: center; width: 100%;">
      <div class="video-container">
        <!-- Added autoplay=1 and mute=1 so it autoplays properly in modern browsers -->
        <iframe 
          src="https://www.youtube.com/embed/exfo9yg0RvM?autoplay=1&mute=1" 
          title="YouTube video player" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <button class="back-to-top" aria-label="Back to top">↑</button>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>

</html>
